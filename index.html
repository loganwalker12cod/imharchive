<script>

            {

            },
            {

            },
            {
                id:5,

                thumbnail:"thumbs/thumbnail5.png",
                video:"PJXaZXkS9PE",
                description:"Majlis, Muharram 5, 1448H at IMH"
            },
            {
                id:6,
                title:"Muharram 6",
                year:"1448H",
                duration:"72 min",
                thumbnail:"thumbs/thumbnail6.png",
                video:"YH42Ws6PRrA",
                description:"Majlis, Muharram 6, 1448H at IMH"
            },
            {
                id:7,
                title:"Muharram 7",
                year:"1448H",
                duration:"85 min",
                thumbnail:"thumbs/thumbnail7.png",
                video:"ec4woP0yBeg",
                description:"Majlis, Muharram 7, 1448H at IMH"
            },
            {
                id:8,
                title:"Muharram 8",
                year:"1448H",
                duration:"96 min",
                thumbnail:"thumbs/thumbnail8.png",
                video:"GVwndIr1Ny8",
                description:"Majlis, Muharram 8, 1448H at IMH"
            },
            {
                id:9,
                title:"Muharram 9",
                year:"1448H",
                duration:"98 min",
                thumbnail:"thumbs/thumbnail9.png",
                video:"kFxAf6I9R-Y",
                description:"Majlis, Muharram 9, 1448H at IMH"
            },
            {
                id:10,
                title:"Sham-e-Ghariban",
                year:"1448H",
                duration:"40 min",
                thumbnail: "thumbs/shameghariban.png",
                video:"2BWtrBWqHOo",
                description:"(AUDIO ONLY) Majlis Sham-e-Ghariban, Muharram 10, 1448H at IMH"
            }
    ]
},
];

const app = document.getElementById("app");

window.addEventListener("hashchange", render);

function findVideo(id){
    for(const album of albums){
        for(const video of album.videos){
            if(video.id === id){
                return video;
            }
        }
    }
    return null;
}

function renderPlayer(id){

    const video = findVideo(id);

    if(!video){
        location.hash = "";
        return;
    }

    app.innerHTML = `
    <div class="max-w-7xl mx-auto p-6 lg:p-10">

        <a
            href="#"
            class="inline-block mb-8 text-zinc-400 hover:text-white"
        >
            Back
        </a>


        <iframe src="https://www.youtube-nocookie.com/embed/${video.video}" height="500px" class="w-full rounded-3xl bg-black" allowfullscreen scrolling="no" allow="accelerometer *; clipboard-write *; encrypted-media *; gyroscope *; picture-in-picture *; web-share *;" referrerpolicy="strict-origin">
        </iframe>

        <div class="mt-8">

            <h1 class="text-4xl font-bold">
                ${video.title}
            </h1>

            <div class="mt-3 text-zinc-500">
                ${video.year} • ${video.duration}
            </div>

            <p class="mt-6 text-zinc-300 max-w-3xl">
                ${video.description}
            </p>

        </div>

    </div>
    `;
}

function renderHome(){

    app.innerHTML = `
    <header class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-b from-black via-black/90 to-transparent">

        <div class="h-16 px-6 lg:px-12 flex items-center justify-between">

            <div class="font-semibold tracking-wider">
                IMH ARCHIVE
            </div>

            <input
                id="search"
                type="search"
                placeholder="Search"
                class="bg-white/10 border border-white/10 rounded-full px-4 py-2 text-sm outline-none"
            >

        </div>

    </header>

    <section
        class="h-[85vh] flex items-end"
        style="
            background-image:
            linear-gradient(to top,#000 5%,transparent 60%),
            url('thumbnail-playlist.png');
            background-size:cover;
            background-position:center;
        "
    >

        <div class="px-6 lg:px-12 pb-24 max-w-3xl">

            <div class="uppercase tracking-[0.3em] text-sm text-white-300 mb-4">
                Featured Majalis Collection
            </div>

            <h1 class="text-5xl md:text-7xl font-bold mb-6">
                Muharram 1448H
            </h1>

            <p class="text-zinc-300 text-lg leading-relaxed">
               اللهم العن قتلة الحسين وأولاد الحسين وأصحاب الحسين
            </p>

        </div>

    </section>

    <div id="rows"></div>
    `;

    const rows = document.getElementById("rows");

    function drawRows(query=""){

        rows.innerHTML = "";

        albums.forEach(album => {

            const videos = album.videos.filter(video => {

                if(query === "") return true;

                return (
                    video.title.toLowerCase().includes(query) ||
                    video.description.toLowerCase().includes(query) ||
                    album.title.toLowerCase().includes(query)
                );

            });

            if(videos.length === 0) return;

            const section = document.createElement("section");

            section.className = "px-6 lg:px-12 pb-20";

            section.innerHTML = `
            <h2 class="text-2xl font-semibold mb-6">
                ${album.title}
            </h2>

            <div class="flex gap-5 overflow-x-auto scrollbar-none pb-4">

                ${videos.map(video => `
                <a
                    href="#/video/${video.id}"
                    class="group shrink-0 w-80"
                >

                    <div class="relative overflow-hidden rounded-3xl">

                        <img
                             src="https://img.youtube.com/vi/${video.video}/maxresdefault.jpg"
                             class="aspect-video w-full object-cover transition duration-500 group-hover:scale-105"
                        >
                        <!-- <img
                             src="${video.thumbnail}"
                             class="aspect-video w-full object-cover transition duration-500 group-hover:scale-105"
                        > -->

                        <div class="absolute inset-0 bg-black/10 group-hover:bg-black/30 transition"></div>

                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">

                            <div class="w-16 h-16 rounded-full bg-white text-black flex items-center justify-center text-xl">
                                ▶
                            </div>

                        </div>

                    </div>

                    <div class="pt-4">

                        <div class="font-medium text-lg">
                            ${video.title}
                        </div>

                        <div class="text-sm text-zinc-500 mt-1">
                            ${video.year} • ${video.duration}
                        </div>

                    </div>

                </a>
                `).join("")}

            </div>
            `;

            rows.appendChild(section);

        });

    }

    drawRows();

    document.getElementById("search").addEventListener("input", e => {
        drawRows(e.target.value.toLowerCase().trim());
    });

}

function render(){

    const hash = location.hash;

    if(hash.startsWith("#/video/")){

        const id = parseInt(hash.split("/")[2]);

        renderPlayer(id);

        return;
    }

    renderHome();
}

render();

</script>

</body>
</html>
